apis:
- aid: oura:oura-ring-api
  name: Oura Ring API
  description: REST API v2 for accessing Oura Ring biometric data including sleep
    summaries, sleep stages, readiness scores, activity summaries, workouts, heart
    rate time series, heart rate variability, SpO2, body temperature, and user tags.
    Supports OAuth2 authorization code flow and personal access tokens, with a sandbox
    environment for testing.
