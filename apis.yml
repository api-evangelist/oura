aid: oura
name: Oura Ring
description: Oura Ring is a smart ring health tracking platform that provides a REST
  API for accessing sleep, activity, readiness, heart rate, daily health scores, and
  50+ biometric metrics via OAuth2. Developers can build integrations that allow users
  to share their Oura Ring data with third-party services, supporting endpoints for
  sleep stages, workout detection, SpO2, heart rate variability, body temperature,
  and more. The platform also supports webhooks for near real-time data updates.
